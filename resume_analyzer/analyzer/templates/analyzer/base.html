{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Resume Analyzer{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'analyzer/css/style.css' %}">
</head>
<body>
<header class="site-header">
  <div class="container header-row">
    <a href="{% url 'analyzer:home' %}" class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <rect x="5" y="2" width="20" height="26" rx="2" stroke="currentColor" stroke-width="2"/>
          <line x1="9" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="2"/>
          <line x1="9" y1="14" x2="21" y2="14" stroke="currentColor" stroke-width="2"/>
          <line x1="9" y1="19" x2="17" y2="19" stroke="currentColor" stroke-width="2"/>
        </svg>
      </span>
      Resume<span class="brand-accent">Check</span>
    </a>
  </div>
</header>

{% if messages %}
<div class="container">
  <div class="messages">
    {% for message in messages %}
      <div class="message message--{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
</div>
{% endif %}

<main>
  {% block content %}{% endblock %}
</main>


<script src="{% static 'analyzer/js/script.js' %}"></script>
</body>
</html>
